{% extends "core/base.html" %}
{% block title %}Live Map — {{ club.name }}{% endblock %}
{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<style>
  #map-wrap{margin:-1rem;height:calc(100vh - 52px);position:relative;overflow:hidden;}
  #live-map{width:100%;height:100%;}

  /* Side panel */
  #map-panel{position:absolute;top:1rem;right:1rem;z-index:1000;background:var(--surface);border-radius:10px;
    box-shadow:0 2px 14px rgba(0,0,0,.18);width:210px;max-height:calc(100vh - 130px);overflow-y:auto;
    display:flex;flex-direction:column;}
  .mp-hd{background:var(--banner);color:#fff;padding:.55rem .85rem;border-radius:10px 10px 0 0;
    font-size:.8rem;font-weight:650;display:flex;align-items:center;gap:.45rem;flex-shrink:0;}
  .mp-body{padding:.5rem .7rem;flex:1;overflow-y:auto;}
  .ac-row{border-bottom:1px solid var(--border-subtle);padding:.4rem 0;}
  .ac-row:last-child{border-bottom:none;}
  .ac-reg{font-size:.82rem;font-weight:700;color:var(--text-1);}
  .ac-sub{font-size:.72rem;color:var(--text-3);}
  .ac-pilot{font-size:.74rem;color:var(--text-2);margin-top:.1rem;}
  .ac-pos{font-size:.7rem;color:var(--text-2);font-family:monospace;margin-top:.1rem;}
  .ac-nofound{font-size:.7rem;color:#b0b8c1;font-style:italic;margin-top:.1rem;}
  .mp-empty{font-size:.78rem;color:#b0b8c1;text-align:center;padding:.5rem 0;}

  /* Refresh badge */
  #map-badge{position:absolute;bottom:1.4rem;left:50%;transform:translateX(-50%);z-index:1000;
    background:rgba(255,255,255,.92);backdrop-filter:blur(4px);padding:.28rem .8rem;border-radius:20px;
    font-size:.72rem;color:var(--text-3);box-shadow:0 1px 6px rgba(0,0,0,.12);
    display:flex;align-items:center;gap:.4rem;white-space:nowrap;}
  #badge-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;transition:background .3s;}

  /* Empty state */
  #map-empty{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;
    pointer-events:none;text-align:center;}
  #map-empty p{background:rgba(255,255,255,.96);border-radius:10px;padding:1rem 1.6rem;
    box-shadow:0 2px 12px rgba(0,0,0,.1);color:var(--text-3);font-size:.88rem;margin:0;}

  /* Aircraft label tooltip */
  .ac-label{background:var(--surface)!important;border:1.5px solid #1f2933!important;border-radius:5px!important;
    box-shadow:0 2px 6px rgba(0,0,0,.18)!important;padding:.18rem .45rem!important;
    font-size:.72rem!important;font-weight:600!important;color:var(--text-1)!important;
    white-space:nowrap!important;line-height:1.3!important;}
  .ac-label::before,.ac-label::after{display:none!important;}

  /* Legend */
  #map-legend{position:absolute;bottom:1.4rem;right:1rem;z-index:1000;background:rgba(255,255,255,.92);
    backdrop-filter:blur(4px);border-radius:8px;padding:.4rem .6rem;
    box-shadow:0 1px 6px rgba(0,0,0,.1);display:flex;flex-direction:row;gap:.6rem;align-items:center;}

  /* Source attribution pill — bottom left */
  #mp-sources{position:absolute;bottom:1.4rem;left:1rem;z-index:1000;background:rgba(255,255,255,.92);
    backdrop-filter:blur(4px);padding:.28rem .75rem;border-radius:20px;
    font-size:.7rem;color:var(--text-3);box-shadow:0 1px 6px rgba(0,0,0,.12);white-space:nowrap;}
  #mp-sources a{color:inherit;text-decoration:none;}
  #mp-sources a:hover{text-decoration:underline;}

  /* Per-aircraft source check links inside panel rows */
  .ac-src{font-size:.65rem;color:#b0b8c1;margin-top:.18rem;}
  .ac-src a{color:inherit;text-decoration:none;}
  .ac-src a:hover{text-decoration:underline;color:var(--text-2);}
</style>

<div id="map-wrap">
  <div id="live-map"></div>

  <!-- Info panel -->
  <div id="map-panel">
    <div class="mp-hd">
      <svg width="13" height="13" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true">

        <path d="M7.5 5v2.5l2 1.5"/>

    <div class="mp-body" id="mp-body">

// ── Leaflet map ──────────────────────────────────────────────────────────────
const map = L.map('live-map', { zoomControl: true }).setView([-41.28, 174.78], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 16,
}).addTo(map);

// ── Icon builder ─────────────────────────────────────────────────────────────
// Container is 80×80 (diagonal of 56×51 Cessna ≈ 76px → fits in 80).
// SVG rotates around its own centre; container stays at anchor [40,40].
window.makeIcon = function(iconType, track, stale) {
  const deg = (track != null) ? track : 0;
  let pathD, vb, w, h;
  if (iconType === 'twin') {
    pathD = TWIN_D;   vb = "0 0 488 388"; w = 60; h = 48;
  } else {
    pathD = CESSNA_D; vb = "0 0 352 322"; w = 56; h = 51;
  }
  const color = stale ? '#9ca3af' : THEME;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${vb}" width="${w}" height="${h}"
    style="transform:rotate(${deg}deg);transform-origin:50% 50%;display:block;flex-shrink:0;">
    <path fill="${color}" fill-rule="evenodd" d="${pathD}"/>
  </svg>`;
  return L.divIcon({
    className: '',
    html: `<div style="width:80px;height:80px;display:flex;align-items:center;justify-content:center;">${svg}</div>`,
    iconSize:      [80, 80],
    iconAnchor:    [40, 40],
    tooltipAnchor: [10, -4],
  });
}

// ── Marker state ─────────────────────────────────────────────────────────────
const markers = {};
const lastKnown = {};
const STALE_MS  = 15 * 60 * 1000;

window.labelHtml = function(ac) {
  const type = ac.aircraft_type ? ` · ${ac.aircraft_type}` : '';
  return `<b>${ac.registration}</b>${type}`;
}

window.buildPopup = function(ac) {
  const alt = ac.alt_ft   != null ? ac.alt_ft.toLocaleString() + ' ft' : '—';
  const spd = ac.speed_kt != null ? ac.speed_kt + ' kt'               : '—';
  const trk = ac.track    != null ? ac.track + '°'                    : '—';
  return `<div style="font-size:.82rem;line-height:1.6;min-width:150px;">
    <div style="font-weight:700;font-size:.95rem;">${ac.registration}</div>
    <div style="color:var(--text-2);">${ac.aircraft_type || '—'}</div>
    ${ac.pilot_name ? `<div>Pilot: <b>${ac.pilot_name}</b></div>` : ''}
    <hr style="margin:.3rem 0;border:none;border-top:1px solid #f0f2f4;">
    <div>Alt: ${alt} &nbsp;·&nbsp; Spd: ${spd} &nbsp;·&nbsp; Trk: ${trk}</div>
  </div>`;
}

window.updateMap = function(aircraft) {
  const seen   = new Set();
  const bounds = [];
  const now    = Date.now();

  // Live aircraft
  aircraft.filter(ac => ac.found).forEach(ac => {
    seen.add(ac.registration);
    lastKnown[ac.registration] = { lat: ac.lat, lon: ac.lon, track: ac.track, icon: ac.icon, seenAt: now };
    bounds.push([ac.lat, ac.lon]);
    if (markers[ac.registration]) {
      markers[ac.registration].setLatLng([ac.lat, ac.lon]);
      markers[ac.registration].setIcon(makeIcon(ac.icon, ac.track, false));
      markers[ac.registration].setTooltipContent(labelHtml(ac));
      markers[ac.registration].setPopupContent(buildPopup(ac));
    } else {
      const m = L.marker([ac.lat, ac.lon], { icon: makeIcon(ac.icon, ac.track, false) })
        .bindTooltip(labelHtml(ac), { permanent: true, direction: 'right', offset: [10, -4], className: 'ac-label' })
        .bindPopup(buildPopup(ac))
        .addTo(map);
      markers[ac.registration] = m;
    }
  });

  // Stale last-known positions (signal lost < 15 min ago)
  aircraft.filter(ac => !ac.found).forEach(ac => {
    const lk = lastKnown[ac.registration];
    if (!lk || (now - lk.seenAt) >= STALE_MS) return;
    seen.add(ac.registration);
    bounds.push([lk.lat, lk.lon]);
    const minsAgo = Math.max(1, Math.round((now - lk.seenAt) / 60000));
    const tip = `${ac.registration} · signal lost ${minsAgo}m ago`;
    if (markers[ac.registration]) {
      markers[ac.registration].setIcon(makeIcon(lk.icon, lk.track, true));
      markers[ac.registration].setTooltipContent(tip);
    } else {
      const m = L.marker([lk.lat, lk.lon], { icon: makeIcon(lk.icon, lk.track, true) })
        .bindTooltip(tip, { permanent: true, direction: 'right', offset: [10, -4], className: 'ac-label' })
        .addTo(map);
      markers[ac.registration] = m;
    }
  });

  Object.keys(markers).forEach(reg => {
    if (!seen.has(reg)) { map.removeLayer(markers[reg]); delete markers[reg]; }
  });

  if (bounds.length === 1)      map.setView(bounds[0], 11);
  else if (bounds.length > 1)   map.fitBounds(L.latLngBounds(bounds), { padding: [100, 100] });

  document.getElementById('map-empty').style.display = (bounds.length === 0) ? 'block' : 'none';
}

window.updatePanel = function(aircraft) {
  const body = document.getElementById('mp-body');
  const now  = Date.now();
  if (!aircraft.length) {
    body.innerHTML = '<p class="mp-empty">No aircraft in fleet</p>';
    return;
  }
  function srcLinks(reg) {
    const r = encodeURIComponent(reg);
    return `<div class="ac-src">Check: <a href="https://opendata.adsb.fi/api/v2/registration/${r}" target="_blank">adsb.fi</a> · <a href="https://api.adsb.lol/v2/registration/${r}" target="_blank">adsb.lol</a></div>`;
  }
  body.innerHTML = aircraft.map(ac => {
    if (!ac.found) {
      const lk = lastKnown[ac.registration];
      if (lk && (now - lk.seenAt) < STALE_MS) {
        const minsAgo = Math.max(1, Math.round((now - lk.seenAt) / 60000));
        return `<div class="ac-row" style="opacity:.65;">
          <div class="ac-reg">${ac.registration}</div>
          <div class="ac-sub">${ac.aircraft_type || ''}</div>
          <div class="ac-nofound">Signal lost · last seen ${minsAgo}m ago</div>
          ${srcLinks(ac.registration)}
        </div>`;
      }
      return `<div class="ac-row" style="opacity:.4;">
        <div class="ac-reg">${ac.registration}</div>
        <div class="ac-sub">${ac.aircraft_type || ''}</div>
        <div class="ac-nofound">Not on ADS-B</div>
        ${srcLinks(ac.registration)}
      </div>`;
    }
    const parts = [];
    if (ac.alt_ft   != null) parts.push(ac.alt_ft.toLocaleString() + ' ft');
    if (ac.speed_kt != null) parts.push(ac.speed_kt + ' kt');
    if (ac.track    != null) parts.push(ac.track + '°');
    return `<div class="ac-row">
      <div class="ac-reg">${ac.registration}</div>
      <div class="ac-sub">${ac.aircraft_type || ''}</div>
      ${ac.pilot_name ? `<div class="ac-pilot">${ac.pilot_name}</div>` : ''}
      <div class="ac-pos">${parts.join(' · ') || 'Position received'}</div>
      ${srcLinks(ac.registration)}
    </div>`;
  }).join('');
}

// ── Refresh ──────────────────────────────────────────────────────────────────
let countdown = REFRESH;
const dot = document.getElementById('badge-dot');
const txt = document.getElementById('badge-txt');

function updateSourceHealth(health) {
  const SRC_COLOR = { found: '#22c55e', empty: '#3b82f6', error: '#ef4444' };
  const SRC_TITLE = { found: 'Supplying data', empty: 'Alive — no aircraft on ADS-B', error: 'Not responding' };
  document.querySelectorAll('#mp-sources a[data-src]').forEach(a => {
    const s = health[a.dataset.src];
    a.style.color = SRC_COLOR[s] || '';
    a.style.fontWeight = s ? '650' : '';
    a.title = SRC_TITLE[s] || '';
  });
}

window.fetchPositions = function() {
  dot.style.background = '#f59e0b';
  txt.textContent = 'Querying ADS-B sources…';
  fetch(API_URL)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      const ac = data.aircraft || [];
      updateMap(ac);
      updatePanel(ac);
      updateSourceHealth(data.src_health || {});
      const found = ac.filter(a => a.found).length;
      countdown = REFRESH;
      dot.style.background = found > 0 ? '#22c55e' : '#8a93a0';
    })
    .catch(() => {
      dot.style.background = '#ef4444';
      txt.textContent = 'Fetch failed — retrying…';
    });
}

setInterval(() => {
  countdown = Math.max(0, countdown - 1);
  if (dot.style.background !== 'rgb(239, 68, 68)')
    txt.textContent = `Refreshes in ${countdown}s`;
}, 1000);

fetchPositions();
setTimeout(fetchPositions, 5000);
setTimeout(fetchPositions, 10000);
setInterval(fetchPositions, REFRESH * 1000);
</script>
